<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototype Render</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 720px;
            background-color: black;
            overflow: hidden;
        }
        #canvas {
            position: relative;
            width: 1280px;
            height: 720px;
            overflow: hidden;
        }
        .clip-element {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }
        #text-target { color: cyan; font-size: 80px; text-align: center; }
    </style>
</head>
<body>
    <div id="canvas" 
         data-composition-id="main" 
         data-width="1280" 
         data-height="720"
         data-start="0">
        
      <div id="clip-clip-1" class="clip-element">
        <h1 id="text-target">Hello Animaker</h1>
      </div>
    
    </div>
    <script>
        // Standard HyperFrames timeline registration
        window.__timelines = window.__timelines || {};
        window.__timelines["main"] = {
            duration: 5,
            fps: 30
        };

        // HyperFrames Bridge for CLI rendering
        window.__hf = {
            duration: 5,
            seek: async (time) => {
                // Control all GSAP animations
                gsap.globalTimeline.pause();
                gsap.globalTimeline.totalTime(time);
                
                // Visibility management based on timeline
                const clips = [{"id":"clip-1","start":0,"duration":3}];
                clips.forEach(clip => {
                    const el = document.getElementById('clip-' + clip.id);
                    if (el) {
                        if (time >= clip.start && time < (clip.start + clip.duration)) {
                            el.style.display = 'block';
                        } else {
                            el.style.display = 'none';
                        }
                    }
                });

                // Wait for next frame to ensure browser has painted
                return new Promise(resolve => requestAnimationFrame(() => resolve()));
            }
        };

        // Initialize animations on load (but paused for the renderer to take control)
        window.addEventListener('load', () => {
            gsap.globalTimeline.pause();
            gsap.from('#text-target', { duration: 1, opacity: 0, y: 50, ease: 'back' });
            
            // Signal readiness to HyperFrames (optional but good practice)
            console.log('HyperFrames Runtime Ready');
        });
    </script>
</body>
</html>
